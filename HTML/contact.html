<!DOCTYPE html>
<html>
    <head>
        <title>Contact Details</title>
        <style>
        .navbar ul{
            list-style-type: none;
            background-color:cadetblue;
            padding: 0px;
            margin: 0px;
            overflow: hidden;
        }
        .navbar a{
            color: black;
            text-decoration: none;
            padding: 15px;
            display: block;
            text-align: center;
        }
        .navbar a:hover{
            background-color: rgb(90, 87, 87);
        }
        .navbar li{
            float: left;
        }
    </style>
    </head>
    <body>
        <nav class="navbar">
            <ul>
                <li><a href="task1.html">Home</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
        <h2>Contact Details</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your name" minlength="3" maxlength="10" required><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" required><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email"><br><br>
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" pattern="[0-9]{10}"><br><br>
            <label for="Position">Position</label>
            <select>
                <option value="Manager">Manager</option>
                <option value="Client">Client</option>
                <option value="User">User</option>
            </select><br>
            <br>
            <label for="address">Address:</label>
            <textarea id="address" rows="3" cols="25"></textarea><br>
            <br>
            <input type="reset"><br><br>
            <input type="submit">
        </form>
    </body>
</html>
